<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elvira-Mando:Bit Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Elvira-Mando:Bit Setup</h1>
        
        <div class="control-block">
            <label for="channelSelect">Select Micro:Bit / Channel:</label>
            <select id="channelSelect">
                <option value="Robot_1">Robot 1 (Primary)</option>
                <option value="Robot_2">Robot 2 (Secondary)</option>
                <option value="Gateway">Gateway Mode</option>
            </select>
        </div>

        <button id="connectBtn">Connect to Bluetooth</button>
        
        <p id="statusText">Status: Disconnected</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
